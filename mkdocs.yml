copyright: Copyright &copy; 2024 - 2025 IcmodTech
edit_uri: tree/main/docs/
extra:
  status:
    new: Recently added
  consent:
    description: 我们使用 cookie 来识别您的重复访问和偏好， 以及衡量我们文档的有效性以及用户是否 找到他们要搜索的内容。在您同意的情况下，您正在帮助我们制作
      我们的文档更好。
    title: Cookie consent
  social:
  - icon: fontawesome/brands/bilibili
    link: https://space.bilibili.com/3546775679928596
  - icon: fontawesome/brands/github
    link: https://github.com/icmodtech/icmod-wiki
extra_css:
- assets/css/style.css
- assets/css/style1.css
- assets/css/css-v1.1.0.css
#extra_javascript:
#- assets/js/language_select.js
markdown_extensions:
- toc:
    permalink: ⚓︎
- pymdownx.highlight:
    anchor_linenums: true
    auto_title: true
    linenums: true
- pymdownx.superfences
- admonition
- neoteroi.timeline
- neoteroi.spantable
- footnotes
- pymdownx.critic
- pymdownx.caret
- pymdownx.keys
- pymdownx.mark
- pymdownx.tilde
- attr_list
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- md_in_html
- pymdownx.details
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.blocks.caption

plugins:
- pub-obsidian
- git-committers: 
    repository: icmodtech/icmod-wiki
    branch: main
- i18n:
      docs_structure: folder
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
- search
- literate-nav:
    nav_file: contents.md
- demo
- tags:
    tags_file: tags.md
- git-revision-date-localized:
    enable_creation_date: true
- glightbox
repo_name: Repository
repo_url: https://github.com/icmodtech/icmod-wiki
site_name: ICMOD WIKI
site_url: https://wiki.icmod.tech
theme:
  favicon: assets/favicon.svg
  features:
  - navigation.tabs
  - toc.follow
  - navigation.sections
  #- navigation.path
  - navigation.instant.progress
  - navigation.top
  - content.action.edit
  - content.code.copy
  - content.action.view
  - content.footnote.tooltips
  - navigation.footer
  icon:
    admonition:
      abstract: octicons/checklist-16
      bug: octicons/bug-16
      danger: octicons/zap-16
      example: octicons/beaker-16
      failure: octicons/x-circle-16
      info: octicons/info-16
      note: octicons/tag-16
      question: octicons/question-16
      quote: octicons/quote-16
      success: octicons/check-16
      tip: octicons/squirrel-16
      warning: octicons/alert-16
    annotation: material/plus-circle
  language: zh
  logo: assets/logo.svg
  name: material
  custom_dir: overrides
  palette:
  - accent: amber
    primary: cyan
    scheme: default
    toggle:
      icon: material/brightness-7
      name: 开启黑暗模式
  - accent: amber
    primary: cyan
    scheme: slate
    toggle:
      icon: material/brightness-4
      name: 关闭黑暗模式
use_directory_urls: false
